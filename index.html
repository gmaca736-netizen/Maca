<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ponte Bonita</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffe4ec;
}

/* encabezado */

header{
background:#e91e63;
color:white;
text-align:center;
padding:25px;
}

header h1{
margin:0;
}

/* productos */

.contenedor{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
}

.producto{
background:white;
width:200px;
margin:10px;
border-radius:15px;
box-shadow:0 0 8px gray;
text-align:center;
padding:10px;
transition:0.3s;
}

.producto:hover{
transform:scale(1.05);
}

.producto img{
width:100%;
height:150px;
border-radius:10px;
}

.precio{
color:#e91e63;
font-size:20px;
font-weight:bold;
}

/* pie */

footer{
background:#e91e63;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>Ponte Bonita</h1>
<p>Maquillaje original y económico</p>
</header>


<div class="contenedor">

<div class="producto">
<img src="labial.jpg">
<h3>Labial Matte</h3>
<p class="precio">$50</p>
</div>

<div class="producto">
<img src="base.jpg">
<h3>Base líquida</h3>
<p class="precio">$120</p>
</div>

<div class="producto">
<img src="rimel.jpg">
<h3>Rubor</h3>
<p class="precio">$80</p>
</div>

<div class="producto">
<img src="sombras.jpg">
<h3>Sombras</h3>
<p class="precio">$150</p>
</div>

</div>


<footer>
Ponte Bonita © 2026
</footer>

</body>
</html>
