<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makeup Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f2f2f2, #ffffff);
            margin: 0;
            padding: 20px;

        }
        h1 {
            text-align: center;
            color: #333;
        }
        .product {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin: 15px;
            text-align: center;
            transition: transform 0.2s;
            background-color: #fff;
        }
        .product:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .price {
            font-size: 1.5em;
            color: #e63946;
        }
        @media (max-width: 600px) {
            .product {
                margin: 5px;
                padding: 10px;
            }
            .price {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to Our Makeup Store! 💄</h1>
    <div class="product">
        <h2>Labial Matte</h2>
        <p class="price">$50</p>
    </div>
    <div class="product">
        <h2>Base Líquida</h2>
        <p class="price">$120</p>
    </div>
    <div class="product">
        <h2>Rubor</h2>
        <p class="price">$80</p>
    </div>
</body>
</html>
